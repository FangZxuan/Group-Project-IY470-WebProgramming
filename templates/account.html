<!DOCTYPE html>   
<html lang="en">
    
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1,0">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">


<title>Navbar</title>

<style>
.create_account {
  text-decoration: none;   /* removes underline */
  color: #007bff;          /* make it blue like a link */
  margin-left: 5px;        /* optional spacing */
}
.create_account:hover {
  text-decoration: underline; /* underline on hover */
}
input[type="password"],
    select {
    padding:20px 10px;
    border:none;
    border-radius:10px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
}

.membership{
    padding:20px 10px;
    border:none;
    border-radius:10px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    
}
.centerlogin{
    margin:auto;
    font-family:sans-serif;
    align-self:flex-start;
    font-size:25px;
    margin-top:-10px;
}
.pair{
    display:grid;
    gap:45px;
    margin-top:-40px;
}
.membership,
.password {
  position: relative;  
  width: 95%;  

       /* match input width */
}
.input-container{
   position:relative;
   width:300px;
   
}
.input-container label {
  position: absolute;
  left: 10px;        /* match input left padding */
  top: 20px;         /* match input top padding */
  font-size: 16px;   
  color: #000000;
  pointer-events: none;
  transition: 0.3s;
  background-color: transparent; /* optional: can use white to cover text behind */
  font-size: 14px;
  
}


/* when input is focused or has text, float the label */
input:focus + label,
input:not(:placeholder-shown) + label {
  top: -13px;       /* above input */
  font-size: 12px; 
  color:black;/* change color */
}

button{
    width:300px;
    border:none;
    background-color:#4184f0;
    color:rgb(219, 219, 219);
    border-radius:30px;
    min-height:40px;
    font-size:15px;
    font-family:sans-serif;
    margin:auto;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
}

</style>

</head>

<body>
    <div class="login_background">

    <form method ="post" action="#" id="login" class="login_form">
    
    
       <div class="centerlogin">LOGIN</div>
       <div class="pair">
       <br>
       <div class="input-container">
          <input type="text" class="membership" id="membership" name="membership"  placeholder=" " required>
          <label for ="membership">MembershipID</label>
       </div>
       
       <div class="input-container">
          <input type="password" class="password" id="password" name="pass_word"  placeholder=" " pattern =".{8,10}" required> 
          <label for="password">Password</label>
       </div>
       
       <button type="submit">Login</button>
<p>Don't have an account? 
  <a href="{{ url_for('signup_page') }}" class="create_account">Sign up here!</a>
</p>
   
   

    
 </form>
</div>
   
<script>
    
    document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("login").classList.add("open");
});

/* Picture */

</script>
</body>
</html>
