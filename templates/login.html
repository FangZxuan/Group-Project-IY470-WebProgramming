<!DOCTYPE html>   
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<title>Login</title>
<style>
body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
}

/* Background image container from your second design */
.login_background {
    min-height: 100vh;
    width: 100%;
    background-image: url("{{ url_for('static', filename='images/gym-bg.jpg') }}"); 
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
    /* Fallback if no image loaded */
    background-color: #2c3e50;
}

.login_form {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    width: 400px;
    animation: slideUp 0.5s ease;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.centerlogin {
    text-align: center;
    font-family: sans-serif;
    font-size: 25px;
    font-weight: bold;
    margin-bottom: 30px;
    margin-top: -10px;
    color: #333;
}

.pair {
    display: flex;
    flex-direction: column;
    gap: 45px;
    margin-top: 20px;
}

.input-container {
    position: relative;
    width: 100%;
}

input[type="text"], input[type="password"] {
    width: 100%;
    padding: 20px 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    box-sizing: border-box;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    background: white;
    outline: none;
}

.input-container label {
    position: absolute;
    left: 10px;
    top: 20px;
    font-size: 16px;
    color: #666;
    pointer-events: none;
    transition: 0.3s;
    background-color: transparent;
}

input:focus + label,
input:not(:placeholder-shown) + label {
    top: -10px;
    font-size: 12px;
    color: #4184f0;
    background-color: white;
    padding: 0 4px;
    left: 6px;
}

button {
    width: 300px;
    margin: 0 auto;
    display: block;
    padding: 15px;
    background-color: #4184f0;
    color: rgb(219, 219, 219);
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-size: 15px;
    font-family: sans-serif;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    font-weight: bold;
    transition: all 0.3s;
}

button:hover {
    background-color: #357ae8;
    color: white;
    transform: translateY(-2px);
}

.create_account {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: #333;
}

.create_account a {
    color: #007bff;
    text-decoration: none;
    font-weight: bold;
    margin-left: 5px;
}

.create_account a:hover {
    text-decoration: underline;
}
</style>
</head>
<body>
    <div class="login_background">
        <form method="post" action="{{ url_for('account_page') }}" id="login" class="login_form">
            <div class="centerlogin">LOGIN</div>
            <div class="pair">
                <div class="input-container">
                    <input type="text" id="membership" name="membership" placeholder=" " required>
                    <label for="membership">Email or Membership ID</label>
                </div>
                
                <div class="input-container">
                    <input type="password" id="password" name="pass_word" placeholder=" " pattern=".{8,10}" required>
                    <label for="password">Password</label>
                </div>
                
                <button type="submit">Login</button>
            </div>
            
            <div class="create_account">
                Don't have an account? 
                <a href="{{ url_for('signup') }}" class="create_account">Sign up here!</a>
            </div>
        </form>
    </div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("login").classList.add("open");
    });
</script>
</body>
</html>
