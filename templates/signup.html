<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1,0">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">



<title>Sign Up</title>
</head>
<style>
.membership,
.email_input,
.Fname_input,
.Lname_input,
.password {
  position: relative;  /* <-- This fixes the label position */
  width: 95%;  
       /* match input width */
}
  label {
  position: absolute;
  left: 12px;
  top: 14px;
  color: #000000;
  pointer-events: none;
  transition: 0.3s;
  background-color: transparent; /* optional: can use white to cover text behind */
  padding: 0 4px;
  font-size: 14px;
  
}


/* when input is focused or has text, float the label */
input:focus + label,
input:not(:placeholder-shown) + label {
  top: -15px;      /* move label above input */
  font-size: 14px; /* shrink */
  color:black;/* change color */
}
    input[type="text"],select{
    width:95%;
    padding:14px 12px;
    border-radius:10px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    line-height:20px;
    margin-bottom:30px;
    margin-right:20px;
    background:transparent;
    border:2px solid #ffffff33;
    }
    
 input[type="password"],select{
    width:95%;
    padding:14px 12px;
    border-radius:10px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    line-height:20px;
    margin-right:20px;
    margin-bottom:30px;
    background:transparent;
     border:2px solid #ffffff33;
    }
   input[type="checkbox"],select{
    margin-bottom:30px;
    margin-top:5px;
   }
    
</style>
<body>

<div class="background-signup">
   
   <div class="signup_container">
    <form action="/submit" method="post" class="signup_form">
        <header class="signn">Sign up</header>

    <div class="membership">
        <input type="text" id="membership" name="membership" placeholder=" " required>
        <label for="membership">Membership ID</label>
    </div>
    <div class="email_input">
        <input type="email" id="email" name="email" placeholder=" " required>
        <label for="email">Email</label>
    </div>

    <div class="Fname_input">
        <input type="text" id="fname" name="fname" placeholder=" " required>
        <label for="fname">First Name</label>    
    </div>

    <div class="Lname_input">
       
        <input type="text" id="Lname"  name="Lname" placeholder=" " required>
        <label for="Lname">Last Name</label>
 
    </div>
    
    <div class="password">
        <input type="password" id="pass_word" name = "pass_word" placeholder=" " pattern=".{8,10}" required>
        <label for="pass_word">Password (8-10 characters)</label>

    </div>
    
    <div class="show-pass">
     <input type="checkbox" onclick="show_password()">check your password
     </div>
    <div class="register_button">
        <input type="submit" id="register" value="Sign Up">
    </div>
    </form>

    </div>










</div>


<script>
    function show_password(){
    var x = document.getElementById("pass_word");
    if (x.type === "password"){
        x.type = "text";
    }
    else{
        x.type = "password";
    }
}
</script>






</body>
</html>
